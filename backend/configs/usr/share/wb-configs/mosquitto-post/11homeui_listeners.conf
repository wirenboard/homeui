# This file describes listeners for Wiren Board Web-interface.
#
# DO NOT EDIT THIS FILE! IT CAN BE MODIFIED BY FIRMWARE UPDATE.
#
# If you want to define your own listeners, use
#
#   /etc/mosquitto/conf.d/10listeners.conf
#
# instead.

# user role
listener 18884
bind_interface lo
protocol websockets
listener_allow_anonymous true
acl_file /usr/share/wb-mqtt-homeui/mosquitto/acl/user.conf

# operator role
listener 18885
bind_interface lo
protocol websockets
listener_allow_anonymous true
acl_file /usr/share/wb-mqtt-homeui/mosquitto/acl/operator.conf

# admin role
listener 18886
bind_interface lo
protocol websockets
listener_allow_anonymous true
