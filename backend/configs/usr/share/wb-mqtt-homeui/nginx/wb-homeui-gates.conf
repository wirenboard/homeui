# Service gates rendered by wb-homeui-backend from /etc/wb-homeui/gates.d/*.json.
proxy_cache_path /var/cache/nginx/wb-gate-auth levels=1 keys_zone=wb_gate_auth:1m max_size=4m inactive=10s use_temp_path=off;
# Pair: 900/min sustained + burst 200 here < backend /auth/check 1000/min — change only together.
limit_req_zone $binary_remote_addr zone=wb_gate_perip:1m rate=15r/s;
include /var/lib/wb-homeui/nginx-gates/*.conf;
